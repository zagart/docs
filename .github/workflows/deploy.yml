name: Deploy API Docs

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-docs-build]
  schedule:
    - cron: '0 6 * * 0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout design
        uses: actions/checkout@v4
        with:
          repository: zagart/design
          token: ${{ secrets.ZAGART_PAT }}
          path: design

      - name: Checkout storage
        uses: actions/checkout@v4
        with:
          repository: zagart/storage
          token: ${{ secrets.ZAGART_PAT }}
          path: storage

      - name: Checkout navigation
        uses: actions/checkout@v4
        with:
          repository: zagart/navigation
          token: ${{ secrets.ZAGART_PAT }}
          path: navigation

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x design/gradlew storage/gradlew navigation/gradlew

      - name: Generate docs — design
        run: |
          cd design
          ./gradlew :ui:dokkaGenerate :builder:dokkaGenerate --no-daemon

      - name: Generate docs — storage
        run: |
          cd storage
          ./gradlew :core:dokkaGenerate --no-daemon

      - name: Generate docs — navigation
        run: |
          cd navigation
          ./gradlew :core:dokkaGenerate --no-daemon

      - name: Assemble docs-site
        run: |
          mkdir -p docs-site/design/ui docs-site/design/builder docs-site/storage docs-site/navigation
          cp -r design/ui/build/dokka/html/* docs-site/design/ui/
          cp -r design/builder/build/dokka/html/* docs-site/design/builder/
          cp -r storage/core/build/dokka/html/* docs-site/storage/
          cp -r navigation/core/build/dokka/html/* docs-site/navigation/

      - name: Copy landing pages, guides, and architecture
        run: |
          cp -r docs-site-assets/index.html docs-site/
          cp -r docs-site-assets/design docs-site/
          cp -r docs-site-assets/integration docs-site/
          cp docs-site-assets/architecture.html docs-site/

      - name: Fix unresolved cross-module symbol references
        run: |
          find docs-site -name '*.html' -exec sed -i 's/ERROR CLASS: Symbol not found for \([A-Za-z]*\)/\1/g' {} +

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy site --project-name zagart-docs --branch main

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Docs deployment failed. Check the workflow logs for details.')
