<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Guides — Zagart Libraries</title>
  <style>
    :root {
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      margin-bottom: 1rem;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card h2 { font-size: 1.25rem; }
    .card p { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.25rem; }
    .back { margin-top: 2rem; }
    .back a { color: var(--accent); text-decoration: none; }
    .back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Setup Guides</h1>
  <p class="subtitle">All libraries are published to Maven Central — just add the dependency.</p>

  <a class="card" href="design.html">
    <h2>Design</h2>
    <p>UI components + screen builder</p>
  </a>
  <a class="card" href="keystone.html">
    <h2>Keystone</h2>
    <p>Persistent key-value &amp; entity storage</p>
  </a>
  <a class="card" href="navigation.html">
    <h2>Navigation</h2>
    <p>Type-safe Compose navigation</p>
  </a>

  <div class="back"><a href="../">&larr; Back to all libraries</a></div>
</body>
</html>
